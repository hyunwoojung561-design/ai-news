name: Yahoo Finance News Slack Bot

on:
  schedule:
    # 매일 UTC 22:37에 실행 (한국 시간(KST)으로 다음날 아침 07:37)
    # KST = UTC + 9시간
    - cron: '37 22 * * *'
  workflow_dispatch: # GitHub 웹 UI에서 수동으로 실행 가능하게 설정

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 패키지 캐싱으로 실행 속도 향상

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Crawler Script
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        TZ: Asia/Seoul # 타임존을 서울(KST)로 설정
      run: python crawler.py
